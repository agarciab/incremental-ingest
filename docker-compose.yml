services:
  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.0
    container_name: opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_healthy

  app:
    build: ./app
    container_name: cocoindex-poc-app
    volumes:
      - ./app:/app
      - ./data:/data
    working_dir: /app
    environment:
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_INDEX: knowledge_chunks
      DATA_DIR: /data/documents
      STATE_DIR: /data/state
      PIPELINE_VERSION: poc-v1
      COCOINDEX_DB: sqlite:////data/state/cocoindex.db
    depends_on:
      opensearch:
        condition: service_healthy

volumes:
  opensearch-data:
